name: Deploy Undangan to VPS

on:
  push:
    branches: [ "master", "prod" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JS dependencies
        run: |
          cd ./
          npm ci

      - name: Deploy via SSH (git + docker)
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            # navigate into the undangan sub‑repo which lives under web/
            if [ ! -d /opt/stack/web/undangan/.git ]; then
              # first‑time deployment: clone repo directly
              rm -rf /opt/stack/web/undangan
              git clone --depth 1 --branch prod https://github.com/nandurstudio/undangan.git /opt/stack/web/undangan
            else
              cd /opt/stack/web/undangan || exit 1
              git fetch --all --prune
              git reset --hard origin/prod
            fi

            # back at stack root for docker commands
            cd /opt/stack
            
            # SAFE deployment: Only restart changed services, keep nginx running
            # This ensures zero downtime and prevents 502 errors
            sudo docker compose pull --ignore-pull-failures || true
            
            # Build only the services that we know changed
            sudo docker compose build --no-cache php flask 2>/dev/null || true
            
            # Restart only php and flask containers - nginx stays running
            # This prevents 502 Bad Gateway errors from nginx stopping
            sudo docker compose restart php 2>/dev/null || true
            sudo docker compose restart flask 2>/dev/null || true
            
            # Verify services came back online (non-blocking)
            sleep 3
            sudo docker compose ps 2>/dev/null | grep -E 'healthy|Up' || true
            
            # Final safety check: ensure nginx is still running
            sudo docker compose exec -T nginx nginx -t 2>/dev/null || true

      - name: Copy node_modules to server
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "node_modules/"
          target: "/opt/stack/web/undangan/"
# Required repository secrets:
# - VPS_HOST (e.g. 146.190.87.175)
# - VPS_USER (e.g. root)
# - VPS_SSH_KEY (private key)
# - VPS_SSH_PORT (optional, default 22)
